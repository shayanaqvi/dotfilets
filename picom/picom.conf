corner-radius = 0.0;
rounded-corners-exclude = [
	"class_g = 'Polybar'",
	"window_type = 'dock'",
	"! name~=''",
	"class_g = 'rofi'"
]
shadow = true;
shadow-opacity = .4;
shadow-offset-x = -20;
shadow-offset-y = -20;
shadow-exclude = [
	"class_g = 'i3bar'",
	"class_g = 'Plank'",
	"name = 'Notification'",
]
fading = false;
fade-in-step = 0.05
inactive-opacity = 1.0;
inactive-dim = 0.1;
